<!doctype html>
<html lang="id">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#b85c72" />
		<title>Offline - Zatiaras POS</title>
		<style>
			:root {
				color-scheme: light;
				font-family:
					Geist,
					Outfit,
					system-ui,
					-apple-system,
					BlinkMacSystemFont,
					"Segoe UI",
					sans-serif;
				background: #faf8f6;
				color: #241f21;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100dvh;
				background: #faf8f6;
			}

			main {
				display: flex;
				min-height: 100dvh;
				align-items: center;
				justify-content: center;
				padding: 24px;
				text-align: center;
			}

			section {
				width: min(100%, 360px);
			}

			h1 {
				margin: 0;
				font-size: 26px;
				line-height: 1.12;
				font-weight: 750;
				letter-spacing: 0;
			}

			p {
				margin: 12px 0 0;
				color: #6d6165;
				font-size: 15px;
				line-height: 1.65;
			}

			a {
				display: inline-flex;
				min-height: 44px;
				align-items: center;
				justify-content: center;
				margin-top: 18px;
				border-radius: 8px;
				background: #b85c72;
				padding: 0 20px;
				color: #ffffff;
				font-size: 14px;
				font-weight: 700;
				text-decoration: none;
				box-shadow: 0 10px 24px rgb(184 92 114 / 0.22);
				transition:
					transform 180ms cubic-bezier(0.2, 0.8, 0.2, 1),
					box-shadow 180ms cubic-bezier(0.2, 0.8, 0.2, 1);
			}

			a:active {
				transform: scale(0.98);
				box-shadow: 0 6px 18px rgb(184 92 114 / 0.18);
			}
		</style>
	</head>
	<body>
		<main>
			<section>
				<h1>Koneksi terputus</h1>
				<p>Zatiaras POS sedang offline. Data baru akan dimuat lagi setelah koneksi kembali.</p>
				<a href="/">Coba lagi</a>
			</section>
		</main>
	</body>
</html>
